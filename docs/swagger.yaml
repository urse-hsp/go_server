basePath: /
definitions:
  userdto.CreateRequest:
    properties:
      password:
        description: 密码
        type: string
      username:
        description: 用户名
        type: string
    required:
    - password
    - username
    type: object
  userdto.LoginResponse:
    properties:
      token:
        description: token
        type: string
      user:
        allOf:
        - $ref: '#/definitions/userdto.PrivateDTO'
        description: 用户信息
    type: object
  userdto.PrivateDTO:
    properties:
      avatar:
        description: 头像
        type: string
      email:
        description: 邮箱
        type: string
      id:
        description: ID
        type: integer
      phone:
        description: 手机号
        type: string
      username:
        description: 用户名
        type: string
    type: object
  userdto.PublicDTO:
    properties:
      avatar:
        description: 头像
        type: string
      id:
        description: ID
        type: integer
      username:
        description: 用户名
        type: string
    type: object
  userdto.UpdateRequest:
    properties:
      avatar:
        description: 头像
        type: string
      username:
        description: 用户名
        type: string
    type: object
  userdto.UserPageResponse:
    properties:
      data:
        description: 列表
        items:
          $ref: '#/definitions/userdto.PublicDTO'
        type: array
      page:
        description: 页码
        type: integer
      pageSize:
        description: 条数
        type: integer
      total:
        description: 总数
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: 接口文档
  title: go-server API
  version: "1.0"
paths:
  /user:
    get:
      parameters:
      - in: query
        name: query
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/userdto.PrivateDTO'
            type: array
      summary: 用户列表
      tags:
      - 用户
  /user/{id}:
    delete:
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
      summary: 删除用户
      tags:
      - 用户
    get:
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/userdto.PrivateDTO'
      summary: 获取用户详情
      tags:
      - 用户
  /user/info:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/userdto.PrivateDTO'
      summary: 获取当前用户信息
      tags:
      - 用户
    put:
      consumes:
      - application/json
      parameters:
      - description: 更新参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/userdto.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/userdto.PrivateDTO'
      summary: 更新当前用户
      tags:
      - 用户
  /user/lists:
    get:
      parameters:
      - in: query
        minimum: 1
        name: page
        required: true
        type: integer
      - in: query
        maximum: 100
        minimum: 1
        name: pageSize
        required: true
        type: integer
      - in: query
        name: query
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/userdto.UserPageResponse'
      summary: 用户列表-分页
      tags:
      - 用户
  /user/login:
    post:
      consumes:
      - application/json
      description: 输入账号密码获取 token
      parameters:
      - description: 登录参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/userdto.CreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/userdto.LoginResponse'
      summary: 用户登录
      tags:
      - 用户
  /user/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/userdto.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/userdto.PrivateDTO'
      summary: 用户注册
      tags:
      - 用户
swagger: "2.0"
