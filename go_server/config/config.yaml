server:
  port: 8080
  mode: "debug"

database:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "123456"
  dbname: "go_demo"

jwt:
  secret: "your-secret-key"
  expire_time: 24  # 过期时间

log:
  log_level: info
  encoding: json           # json or console
  log_file_name: "./storage/logs/server.log"
  max_backups: 30              # 日志文件最多保存多少个备份
  max_age: 7                   #  文件最多保存多少天
  max_size: 1024               #  每个日志文件保存的最大尺寸 单位：M
  compress: true               # 是否压缩
